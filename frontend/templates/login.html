<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolboxV8 – Connexion</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #070b14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grille animée en fond */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(239,68,68,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(239,68,68,.07) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    /* Points lumineux */
    .bg-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
    }
    .bg-glow-1 { width: 500px; height: 500px; background: rgba(239,68,68,.12); top: -150px; left: -150px; }
    .bg-glow-2 { width: 400px; height: 400px; background: rgba(59,130,246,.10); bottom: -100px; right: -100px; }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      width: 420px;
      background: rgba(15,23,42,.85);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 16px;
      padding: 48px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(239,68,68,.08), 0 25px 50px rgba(0,0,0,.6);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(239,68,68,.4);
    }
    .logo-text { font-size: 1.4rem; font-weight: 800; color: #f1f5f9; letter-spacing: -.5px; }
    .logo-sub  { font-size: .72rem; color: #64748b; letter-spacing: 2px; text-transform: uppercase; }

    h1 { font-size: 1.6rem; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    .subtitle { color: #64748b; font-size: .9rem; margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: .82rem; font-weight: 600; color: #94a3b8; margin-bottom: 8px; letter-spacing: .5px; text-transform: uppercase; }

    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: #475569; font-size: 16px; pointer-events: none;
    }
    input {
      width: 100%; padding: 12px 14px 12px 42px;
      background: rgba(30,41,59,.8);
      border: 1px solid rgba(51,65,85,.8);
      border-radius: 10px;
      color: #f1f5f9; font-size: .95rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus {
      border-color: rgba(239,68,68,.6);
      box-shadow: 0 0 0 3px rgba(239,68,68,.1);
    }
    input::placeholder { color: #475569; }

    .btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border: none; border-radius: 10px;
      color: #fff; font-size: 1rem; font-weight: 700;
      cursor: pointer; letter-spacing: .5px;
      transition: opacity .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(239,68,68,.35);
      margin-top: 8px;
    }
    .btn:hover { opacity: .9; box-shadow: 0 6px 25px rgba(239,68,68,.5); }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: 12px 16px; border-radius: 10px; font-size: .88rem;
      margin-bottom: 20px; display: none; align-items: center; gap: 10px;
    }
    .alert--error { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
    .alert--success { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.3); color: #86efac; }

    .footer-links { margin-top: 28px; text-align: center; }
    .footer-links a { color: #475569; font-size: .8rem; text-decoration: none; }
    .footer-links a:hover { color: #94a3b8; }

    .tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      background: rgba(239,68,68,.15); color: #ef4444; border: 1px solid rgba(239,68,68,.2);
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon"><i data-lucide="shield-check"></i></div>
      <div>
        <div class="logo-text">ToolboxV8</div>
      </div>
    </div>

    <h1>Connexion</h1>
    <p class="subtitle">Entrez vos identifiants pour accéder à la plateforme</p>

    {% if error %}
    <div class="alert alert--error" style="display:flex">
      <i data-lucide="alert-triangle"></i> <span>{{ error }}</span>
    </div>
    {% endif %}

    <form id="login-form" method="POST" action="/login" autocomplete="off">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <div class="input-wrap">
          <span class="input-icon"><i data-lucide="user"></i></span>
          <input type="text" id="username" name="username" placeholder="admin" value="{{ username or '' }}" required autofocus />
        </div>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <span class="input-icon"><i data-lucide="lock"></i></span>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>
      </div>
      <button type="submit" class="btn" id="btn-submit">
        <div class="btn-inner">
          <div class="spinner" id="spinner"></div>
          <span id="btn-text">Se connecter</span>
        </div>
      </button>
    </form>

  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', () => {
      const btn     = document.getElementById('btn-submit');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btn-text');
      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Connexion…';
    });

    if (window.lucide) lucide.createIcons();
  </script>
</body>
</html>
