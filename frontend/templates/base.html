<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ToolboxV8{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css" />
  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__brand">
      <span class="brand-icon">&#x1F6E1;</span>
      <span class="brand-name">ToolboxV8</span>
    </div>
    <nav class="sidebar__nav">
      <a href="/api/dashboard/" class="nav-link {% block nav_dash %}{% endblock %}">
        <span class="icon">&#x1F4CA;</span> Dashboard
      </a>
      <a href="/api/modules/" class="nav-link {% block nav_modules %}{% endblock %}">
        <span class="icon">&#x1F9F0;</span> Modules
      </a>
      <a href="/api/reports/" class="nav-link {% block nav_reports %}{% endblock %}">
        <span class="icon">&#x1F4C4;</span> Rapports
      </a>
    </nav>
    <div class="sidebar__footer">
      {% if user %}
        <span class="user-badge user-badge--{{ user.role }}">{{ user.role }}</span>
        <span class="username">{{ user.username }}</span>
        <a href="/api/auth/logout" class="btn-logout">Déconnexion</a>
      {% endif %}
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/main.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
