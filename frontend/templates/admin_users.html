<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Utilisateurs – ToolboxV8</title>
  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .role-badge {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      font-size: .75rem; font-weight: 600; text-transform: uppercase;
    }
    .role-admin   { background: rgba(239,68,68,.15);  color: #f87171; }
    .role-analyst { background: rgba(59,130,246,.15); color: #60a5fa; }
    .role-reader  { background: rgba(107,114,128,.15); color: #9ca3af; }
    .status-active   { color: #4ade80; font-weight: 600; }
    .status-inactive { color: #9ca3af; font-style: italic; }
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-backdrop.show { display: flex; }
    .modal-box {
      background: #0f172a; border: 1px solid rgba(148,163,184,.2);
      border-radius: 10px; padding: 24px; min-width: 420px; max-width: 540px;
    }
    .modal-box h3 { margin: 0 0 16px; color: #e2e8f0; }
    .modal-row { margin-bottom: 12px; }
    .modal-row label { display: block; font-size: .8rem; color: #94a3b8; margin-bottom: 4px; }
    .modal-row input, .modal-row select {
      width: 100%; padding: 8px 12px; border-radius: 6px;
      background: #1e293b; border: 1px solid rgba(148,163,184,.2);
      color: #e2e8f0; font-size: .9rem;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i data-lucide="shield-check"></i></div>
    <div><div class="brand-name">ToolboxV8</div><div class="brand-sub">v1.0.0</div></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Navigation</div>
    <a href="/dashboard" class="nav-item"><span class="nav-icon"><i data-lucide="layout-dashboard"></i></span> Dashboard</a>
    <a href="/modules" class="nav-item"><span class="nav-icon"><i data-lucide="wrench"></i></span> Modules</a>
    <a href="/reports" class="nav-item"><span class="nav-icon"><i data-lucide="file-text"></i></span> Rapports</a>
    <div class="nav-section-label" style="margin-top:16px">Défensif</div>
    <a href="/siem" class="nav-item"><span class="nav-icon"><i data-lucide="radar"></i></span> SIEM</a>
    <div class="nav-section-label" style="margin-top:16px">Administration</div>
    <a href="/admin/users" class="nav-item active"><span class="nav-icon"><i data-lucide="users"></i></span> Utilisateurs</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">A</div>
      <div><div class="user-name" id="user-name">–</div><div class="user-role" id="user-role">–</div></div>
    </div>
    <button class="btn-logout" onclick="logout()" title="Déconnexion"><i data-lucide="log-out"></i></button>
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="page-title">Gestion des utilisateurs</h1>
      <span class="breadcrumb">Administration · RBAC à 3 rôles</span>
    </div>
    <div class="topbar-right">
      <div class="status-dot" id="api-status"></div>
      <span class="topbar-time" id="clock">–</span>
    </div>
  </header>

  <div class="content">

    <!-- Formulaire de création -->
    <div class="panel" style="margin-bottom:24px">
      <div class="panel-header">
        <h2 class="panel-title">Créer un utilisateur</h2>
      </div>
      <form class="inline-form" onsubmit="createUser(event)">
        <div class="form-group" style="flex:1">
          <label>Nom d'utilisateur</label>
          <input type="text" id="new-username" placeholder="ex: jdoe" required minlength="2" maxlength="64" />
        </div>
        <div class="form-group" style="flex:1.4">
          <label>Email</label>
          <input type="email" id="new-email" placeholder="ex: jdoe@client.fr" required />
        </div>
        <div class="form-group" style="flex:1">
          <label>Mot de passe</label>
          <input type="password" id="new-password" placeholder="min. 4 caractères" required minlength="4" />
        </div>
        <div class="form-group" style="flex:.8">
          <label>Rôle</label>
          <select id="new-role" required>
            <option value="reader">reader (lecture seule)</option>
            <option value="analyst">analyst (lancer scans)</option>
            <option value="admin">admin (tout faire)</option>
          </select>
        </div>
        <div class="form-group" style="align-self:flex-end">
          <button type="submit" class="btn-launch" style="padding:12px 24px">
            <i data-lucide="user-plus"></i> Créer
          </button>
        </div>
      </form>
      <div id="create-msg" style="display:none;margin-top:12px" class="launch-result"></div>
    </div>

    <!-- Liste des utilisateurs -->
    <div class="panel">
      <div class="panel-header">
        <h2 class="panel-title">Tous les utilisateurs</h2>
        <button class="panel-action" onclick="loadUsers()">
          <i data-lucide="refresh-cw"></i> Actualiser
        </button>
      </div>
      <table class="table" id="users-table">
        <thead>
          <tr>
            <th>#</th><th>Utilisateur</th><th>Email</th><th>Rôle</th>
            <th>Statut</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="6" class="table-empty">Chargement…</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</main>

<!-- Modale d'édition -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal-box">
    <h3 id="edit-title">Modifier l'utilisateur</h3>
    <input type="hidden" id="edit-user-id" />
    <div class="modal-row">
      <label>Rôle</label>
      <select id="edit-role">
        <option value="reader">reader</option>
        <option value="analyst">analyst</option>
        <option value="admin">admin</option>
      </select>
    </div>
    <div class="modal-row">
      <label>Nouveau mot de passe (vide = inchangé)</label>
      <input type="password" id="edit-password" placeholder="laisser vide pour ne pas changer" />
    </div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeEditModal()">Annuler</button>
      <button class="btn-launch" style="padding:8px 18px" onclick="saveEditUser()">Enregistrer</button>
    </div>
    <div id="edit-msg" style="margin-top:12px;display:none" class="launch-result"></div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
  requireAuth();
  loadUserInfo();
  startClock();
  loadUsers();
  if (window.lucide) lucide.createIcons();

  async function loadUsers() {
    try {
      const users = await apiFetch('/api/users/');
      const tbody = document.getElementById('users-body');
      if (!users || users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="table-empty">Aucun utilisateur</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr>
          <td class="td-id">#${u.id}</td>
          <td><strong>${escapeHtml(u.username)}</strong></td>
          <td>${escapeHtml(u.email)}</td>
          <td><span class="role-badge role-${u.role}">${u.role}</span></td>
          <td>${u.is_active
              ? '<span class="status-active">● Actif</span>'
              : '<span class="status-inactive">○ Désactivé</span>'}</td>
          <td style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn-sm" onclick="openEditModal(${u.id}, '${escapeAttr(u.username)}', '${u.role}')">
              <i data-lucide="edit-2"></i> Éditer
            </button>
            <button class="btn-sm" onclick="toggleActive(${u.id}, ${u.is_active})">
              <i data-lucide="${u.is_active ? 'user-x' : 'user-check'}"></i>
              ${u.is_active ? 'Désactiver' : 'Réactiver'}
            </button>
            <button class="btn-sm btn-danger" onclick="deleteUser(${u.id}, '${escapeAttr(u.username)}')">
              <i data-lucide="trash-2"></i> Supprimer
            </button>
          </td>
        </tr>`).join('');
      if (window.lucide) lucide.createIcons();
    } catch (err) {
      const tbody = document.getElementById('users-body');
      if (err.message && err.message.includes('403')) {
        tbody.innerHTML = '<tr><td colspan="6" class="table-empty">Accès refusé — rôle admin requis</td></tr>';
      } else {
        tbody.innerHTML = `<tr><td colspan="6" class="table-empty">Erreur : ${escapeHtml(err.message || 'inconnue')}</td></tr>`;
      }
    }
  }

  async function createUser(e) {
    e.preventDefault();
    const username = document.getElementById('new-username').value.trim();
    const email    = document.getElementById('new-email').value.trim();
    const password = document.getElementById('new-password').value;
    const role     = document.getElementById('new-role').value;
    const msgEl    = document.getElementById('create-msg');

    try {
      await apiFetch('/api/users/', {
        method: 'POST',
        body: JSON.stringify({ username, email, password, role }),
      });
      msgEl.innerHTML = `<span>✅</span> Utilisateur <strong>${escapeHtml(username)}</strong> créé avec le rôle <strong>${role}</strong>.`;
      msgEl.style.background = 'rgba(34,197,94,.1)';
      msgEl.style.display = 'flex';
      document.getElementById('new-username').value = '';
      document.getElementById('new-email').value = '';
      document.getElementById('new-password').value = '';
      document.getElementById('new-role').value = 'reader';
      await loadUsers();
    } catch (err) {
      msgEl.innerHTML = `<span>⚠</span> Erreur : ${escapeHtml(err.message)}`;
      msgEl.style.background = 'rgba(239,68,68,.1)';
      msgEl.style.display = 'flex';
    }
  }

  function openEditModal(userId, username, currentRole) {
    document.getElementById('edit-title').textContent = `Modifier « ${username} »`;
    document.getElementById('edit-user-id').value = userId;
    document.getElementById('edit-role').value = currentRole;
    document.getElementById('edit-password').value = '';
    document.getElementById('edit-msg').style.display = 'none';
    document.getElementById('edit-modal').classList.add('show');
  }

  function closeEditModal() {
    document.getElementById('edit-modal').classList.remove('show');
  }

  async function saveEditUser() {
    const userId = parseInt(document.getElementById('edit-user-id').value);
    const role   = document.getElementById('edit-role').value;
    const pwd    = document.getElementById('edit-password').value;
    const body   = { role };
    if (pwd) body.password = pwd;
    const msgEl  = document.getElementById('edit-msg');

    try {
      await apiFetch(`/api/users/${userId}`, {
        method: 'PATCH',
        body: JSON.stringify(body),
      });
      closeEditModal();
      await loadUsers();
    } catch (err) {
      msgEl.innerHTML = `<span>⚠</span> Erreur : ${escapeHtml(err.message)}`;
      msgEl.style.background = 'rgba(239,68,68,.1)';
      msgEl.style.display = 'flex';
    }
  }

  async function toggleActive(userId, isCurrentlyActive) {
    try {
      await apiFetch(`/api/users/${userId}`, {
        method: 'PATCH',
        body: JSON.stringify({ is_active: !isCurrentlyActive }),
      });
      await loadUsers();
    } catch (err) {
      alert('Erreur : ' + err.message);
    }
  }

  async function deleteUser(userId, username) {
    if (!confirm(`Supprimer définitivement l'utilisateur "${username}" ? Cette action est irréversible.`)) return;
    try {
      await apiFetch(`/api/users/${userId}`, { method: 'DELETE' });
      await loadUsers();
    } catch (err) {
      alert('Erreur : ' + err.message);
    }
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function escapeAttr(s) {
    return String(s || '').replace(/['"\\]/g, '\\$&');
  }
</script>
</body>
</html>
