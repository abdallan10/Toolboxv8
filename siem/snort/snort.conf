# ============================================================
# Snort 3 – Configuration PentestBox
# ============================================================

# Réseau local à surveiller
HOME_NET = any
EXTERNAL_NET = !$HOME_NET

# Répertoire des règles
RULE_PATH = /etc/snort/rules
BUILTIN_RULE_PATH = /usr/lib/snort_dynamicrules

# ---- Chemins des plugins ----
configure {
    daq_dir = "/usr/lib/daq"
    daq = "pcap"
    daq_mode = "passive"
}

# ---- Décodeur ----
stream5_global: track_tcp yes, track_udp yes, track_icmp no, max_tcp 262144

# ---- Préprocesseurs ----
http_inspect: global iis_unicode_map_filename unicode.map iis_unicode_code_page 1252

ftp_telnet: global inspection_type stateful

smtp: ports { 25 587 465 }

# ---- Sortie : alertes vers fichier + syslog ----
output alert_fast: /var/log/snort/alert
output log_tcpdump: /var/log/snort/snort.log

# ---- Règles ----
include $RULE_PATH/local.rules
include $RULE_PATH/community.rules
include $RULE_PATH/emerging-threats.rules
