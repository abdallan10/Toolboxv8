input {
  # Logs applicatifs de l'API PentestBox
  beats {
    port => 5044
  }

  # Logs Snort IDS
  file {
    path  => "/var/log/snort/alert"
    type  => "snort_alert"
    start_position => "beginning"
    sincedb_path   => "/dev/null"
  }

  # Logs Docker (via stdin)
  stdin {
    type => "docker"
  }
}

filter {
  if [type] == "snort_alert" {
    grok {
      match => {
        "message" => "\[%{NUMBER:gid}:%{NUMBER:sid}:%{NUMBER:rev}\]\s+%{DATA:alert_msg}\s+\[Classification:\s*%{DATA:classification}\]"
      }
    }
    mutate {
      add_field => { "event_type" => "ids_alert" }
    }
  }

  # Enrichissement commun
  mutate {
    add_field => { "[@metadata][index]" => "pentest-logs" }
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts       => ["${ELASTICSEARCH_URL:http://elasticsearch:9200}"]
    index       => "pentest-logs-%{+YYYY.MM.dd}"
    action      => "index"
  }

  # Debug en développement
  if [@metadata][debug] {
    stdout { codec => rubydebug }
  }
}
